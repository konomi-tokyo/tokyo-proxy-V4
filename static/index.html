
<!DOCTYPE html>
<html>

<head>
  <title>連番を簡単に生成！！</title>
  <script src="https://cdn.jsdelivr.net/npm/darkmode-js@1.5.7/lib/darkmode-js.min.js"></script>
<script>
  function addDarkmodeWidget() {
    new Darkmode().showWidget();
  }
  window.addEventListener('load', addDarkmodeWidget);
</script>

<style>
.example4{
    background: linear-gradient(to right,#e60000,#f39800,#fff100,#009944,#0068b7,#1d2088,#920783,#e60000) 0 / 200%;
    animation: 5s example4 linear infinite;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
@keyframes example4{
    100% { background-position: 200%; }
}
</style>
</head>
<body>
<a href="/proxy.html">Yuki Youtube</a>
<div class="example4"><h2>掲示板</h2></div>
<h5><font color="#00ff00">新規さんへ、先ずは挨拶をしましょう。シード値は自分のidを決めるものでパスワードのようなものです。</font><br><font color="#00ff00">今の話題に勇気を出して参加してみましょう！！！</font><br>
<font color="#00ff00">メッセージが送れない場合メッセージや名前が規制されている可能性があります。</h5></font><br>
<a href="https://discord.gg/44y6tSA3bM/">Discord</a>

<form action="/bbs/result" method="get">
    <select name="channel" id="channel">
  
    </select>
    <br>
    <label for="article"><font color="#00ff00">メッセージ</font></label>
    <textarea name="message" rows="6" cols="100" maxlength="50" required></textarea>
    <p></p>
    <label for="name"><h4><font color="#00ff00">名前</font></h4></label>
    <input type="text" name="name" value="" maxlength="25" required>
    <label for="seed"><h4><font color="#00ff00">シード</font></h4></label>
    <input type="text" name="seed" value="" required>
    <button type="submit">送信する</button>
    <br>
<h4><font color="#00ff00">スピーカー以上のメッセージのみ表示</font></h4><input type="checkbox" id="filter" name="verify" >
<h3>投稿</h3>
</form>

<div id="messages">
</div>
<script>
  function AutoLink(str) {
  var regexp_url = /((h?)(ttps?:\/\/[a-zA-Z0-9.\-_@:/~?%&;=+#',()*!]+))/g; // ']))/;
  var regexp_makeLink = function(all, url, h, href) {
      return '<a href="h' + href + '">' + url + '</a>';
  }

  return str.replace(regexp_url, regexp_makeLink);
}
let element = document.getElementById('filter');
let channel = document.getElementById('channel')
function reloadmessages(){
  var xhr = new XMLHttpRequest();
  xhr.open("GET", "/bbs/api?channel="+channel.value+"&verify="+element.checked+"&t="+Date.now());
      xhr.onload = function () {
          if (xhr.status == 200) {
              document.getElementById('messages').innerHTML = AutoLink(xhr.responseText);
          }
      };
      xhr.send();
}
reloadmessages();
setTimeout(reloadmessages,1000)
setInterval(reloadmessages,5000);
</script>
</body>

</html>
